- uses: actions/checkout@v3
      
      - name: Inyectar API Key en menu.html
        run: |
          sed -i 's|LLAVE_SECRETA_AQUI|${{ secrets.GEMINI_API_KEY }}|g' menu.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true