<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRAXIS | AVISO DE SISTEMA</title>
    <style>
        :root {
            --logo-grad-start: #00d2ff;
            --logo-grad-end: #3a7bd5;
            --text-dark: #000;
            --bg-body: #ffffff;
            --text-wall: #efefef;
            --brutal-shadow: 12px 12px 0px #000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body);
            font-family: 'Arial Black', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative;
            padding: 20px;
        }

        /* Fondo dinámico de textos plomos con más velocidad */
        .background-wall {
            position: fixed; 
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            display: flex; flex-wrap: wrap;
            gap: 20px; z-index: 1;
            transform: rotate(-15deg);
            pointer-events: none;
            animation: scrollWall 40s linear infinite;
        }

        .background-wall span { 
            font-size: 24px; 
            font-weight: 900; 
            text-transform: uppercase; 
            color: var(--text-wall);
            letter-spacing: 1px;
        }

        @keyframes scrollWall {
            from { transform: translate(0, 0) rotate(-15deg); }
            to { transform: translate(-500px, -500px) rotate(-15deg); }
        }

        /* Contenedor con animación de entrada con rebote */
        .container {
            background: #fff;
            border: 6px solid #000;
            padding: 60px 30px;
            box-shadow: var(--brutal-shadow);
            text-align: center;
            max-width: 520px;
            width: 100%;
            z-index: 10;
            position: relative;
            animation: containerEntry 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes containerEntry {
            0% { transform: translateY(100px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .presenta {
            font-size: 11px;
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 5px;
            color: #888;
            text-transform: uppercase;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; color: var(--text-dark); }
        }

        .brand-name {
            font-size: 14px;
            font-weight: 950;
            color: #000;
            margin-bottom: 25px;
            display: inline-block;
            border-bottom: 4px solid #000;
            padding-bottom: 2px;
        }

        /* Logo con degradado y animación de flotación */
        h1 {
            font-size: clamp(50px, 16vw, 90px);
            text-transform: uppercase;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
            background: linear-gradient(135deg, var(--logo-grad-start), var(--logo-grad-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            animation: logoFloat 4s ease-in-out infinite;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.05));
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        /* Bloque de aviso "Beta No Disponible" */
        .alert-box {
            background: #000;
            color: #fff;
            padding: 20px;
            margin: 20px 0;
            border: 4px solid #000;
            position: relative;
            animation: slideLeft 0.6s 0.3s both cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideLeft {
            0% { transform: translateX(50px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .alert-title {
            font-size: 18px;
            text-transform: uppercase;
            color: var(--logo-grad-start);
            margin-bottom: 10px;
        }

        .alert-text {
            font-size: 13px;
            line-height: 1.5;
            font-weight: 400;
        }

        .status-update {
            margin-top: 25px;
            font-size: 15px;
            color: #000;
            border: 3px double #000;
            padding: 12px;
            background: #f9f9f9;
            animation: revealText 0.5s 0.8s both;
        }

        @keyframes revealText {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .highlight {
            color: var(--logo-grad-end);
            display: block;
            margin-top: 10px;
            font-size: 16px;
        }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Animación de los cuadros de fondo que aparecen al azar */
        .decor {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #000;
            z-index: 5;
            opacity: 0.1;
        }
    </style>
</head>
<body>

    <div class="background-wall" id="wall"></div>

    <div class="container">
        <div class="presenta">ALONIXZ-GROUP PRESENTA</div>
        <div class="brand-name">ESTADO DEL PROYECTO</div>
        
        <h1>PRAXIS</h1>
        
        <div class="alert-box">
            <div class="alert-title">¡BETA NO DISPONIBLE!</div>
            <div class="alert-text">
                El periodo de pruebas ha concluido satisfactoriamente.
            </div>
        </div>

        <div class="status-update">
            La infraestructura está lista.<br>
            <strong>EL LANZAMIENTO ESTÁ MUY CERCA.</strong>
            <span class="highlight">BETA ACTUALIZADA A v1.0.0</span>
        </div>
        
        <p class="footer">ESTABILIZANDO SERVIDORES | MAYO 2026</p>
    </div>

    <script>
        // Generar fondo de textos plomos
        const wall = document.getElementById('wall');
        const fragment = document.createDocumentFragment();
        for(let i=0; i<180; i++) {
            const span = document.createElement('span');
            span.innerText = "PRAXIS ";
            fragment.appendChild(span);
        }
        wall.appendChild(fragment);

        // Lógica de acceso para el dueño (P + X + S)
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (keys['p'] && keys['x'] && keys['s']) {
                // Animación de salida rápida para entrar al panel
                document.querySelector('.container').style.transform = "scale(1.2) translateY(-100vh)";
                document.querySelector('.container').style.transition = "0.5s ease-in";
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 400);
            }
        });
        document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
    </script>
</body>
</html>
