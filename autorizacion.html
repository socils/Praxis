<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAXIS | ACTUALIZACIÓN DE SISTEMA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');

        :root {
            --primary: #0071ff;
            --accent: #00ff88;
            --negro: #050505;
            --blanco: #ffffff;
            --brutal-shadow: 15px 15px 0px var(--negro);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--primary);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* FONDO DINÁMICO */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 60px 60px;
            transform: rotateX(60deg) translateY(-20%);
            animation: moveGrid 5s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 0 60px; }
        }

        /* TARJETA DE AVISO */
        .info-card {
            background: var(--blanco);
            border: 6px solid var(--negro);
            padding: 50px 40px;
            max-width: 550px;
            width: 90%;
            position: relative;
            z-index: 10;
            box-shadow: var(--brutal-shadow);
            text-align: center;
            animation: popUp 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s;
        }

        @keyframes popUp {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* INDICADOR DE CARGA */
        .loader-wrap {
            width: 100%;
            height: 40px;
            border: 4px solid var(--negro);
            margin: 25px 0;
            background: #eee;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            width: 99%;
            background: var(--accent);
            animation: fillGlow 1.5s ease-in-out infinite;
        }

        @keyframes fillGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); box-shadow: 0 0 20px var(--accent); }
        }

        h1 {
            font-size: clamp(35px, 8vw, 55px);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .tag {
            display: inline-block;
            background: var(--negro);
            color: var(--blanco);
            padding: 8px 15px;
            font-weight: 900;
            font-size: 13px;
            margin-bottom: 20px;
            transform: skewX(-10deg);
        }

        /* CONSOLA DE HACK */
        .hack-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: none;
            color: var(--accent);
            padding: 40px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            border: 10px solid var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .typing-text {
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--accent);
            width: 0;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        .active-typing {
            animation: typing 1s steps(40, end) forwards, blink .7s step-end infinite;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <!-- CONSOLA MEJORADA -->
    <div class="hack-overlay" id="hack">
        <div id="line1">> INICIANDO BYPASS DE SEGURIDAD...</div>
        <div id="line2" style="margin-top: 10px;">> HACKEANDO SISTEMAS...</div>
        <div id="line3" style="margin-top: 20px; font-size: 30px; font-weight: 900; color: #fff;">> ¡BIENVENIDO DUEÑO!</div>
    </div>

    <div class="info-card">
        <div class="tag">FASE BETA: FINALIZADA</div>
        <h1>¡YA CASI ESTAMOS LISTOS!</h1>
        
        <div class="loader-wrap">
            <div class="loader-fill"></div>
        </div>

        <p style="font-weight: 600; margin-bottom: 20px;">
            La versión <strong>Beta</strong> ya no está disponible porque estamos a punto de lanzar la <strong>v1.0.0</strong>.
        </p>

        <div style="background: #000; color: #fff; padding: 15px; font-weight: 900; border: 3px solid #000;">
            SINCRONIZANDO SERVIDORES...
        </div>

        <p style="margin-top: 35px; font-size: 11px; font-weight: 900; opacity: 0.4;">
            LANZAMIENTO: MAYO 2026
        </p>
    </div>

    <script>
        // BACKDOOR: P + X + S (Praxis)
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (keys['p'] && keys['x'] && keys['s']) {
                // Efecto visual de la tarjeta
                const card = document.querySelector('.info-card');
                card.style.transform = "scale(0) rotate(720deg)";
                card.style.opacity = "0";

                // Activar consola de dueño
                setTimeout(() => {
                    const hack = document.getElementById('hack');
                    hack.style.display = 'block';
                    
                    // Secuencia de mensajes
                    document.getElementById('line1').classList.add('active-typing');
                    
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500); // Tiempo para leer "¡BIENVENIDO DUEÑO!"
                }, 400);
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
    </script>
</body>
</html>
