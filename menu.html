<script type="module">/**
 * Praxis Error Guardian
 * Monitorea errores en consola y fallos de red para redirigir a error.html
 */
const iniciarGuardianPraxis = () => {
    // 1. Capturar errores de ejecución (Sintaxis, variables no definidas, etc.)
    window.onerror = function(message, source, lineno, colno, error) {
        console.error("❌ Error Crítico detectado:", message);
        window.location.href = "error.html";
        return true; 
    };

    // 2. Capturar promesas fallidas (Errores de Firebase, carga de datos, etc.)
    window.onunhandledrejection = function(event) {
        console.error("❌ Error de Promesa:", event.reason);
        window.location.href = "error.html";
    };

    // 3. Capturar errores de carga de archivos (Imágenes rotas o scripts no encontrados)
    window.addEventListener('error', function(event) {
        if (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK') {
            console.error("❌ Error al cargar recurso crítico:", event.target.src || event.target.href);
            window.location.href = "error.html";
        }
    }, true);
};

 function cargarAgenda(currentUserUid) {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    
    // Limpieza inmediata al iniciar la función para evitar residuos de otras vistas
    const banner = document.querySelector('.banner');
    const oldAdminBtn = document.getElementById('admin-publish-btn');
    if (oldAdminBtn) oldAdminBtn.remove();
    
    if (code) {
        const agendaRef = ref(db, 'agendas/' + code);
        
        onValue(agendaRef, (snapshot) => {
            const data = snapshot.val();
            container.innerHTML = "";
            statusMsg.innerHTML = "";
            
            // Limpieza interna: Cada vez que Firebase detecta un cambio, 
            // borramos el botón antes de decidir si lo volvemos a crear.
            const currentBtn = document.getElementById('admin-publish-btn');
            if(currentBtn) currentBtn.remove();

            if (data) {
                bannerTitle.innerText = data.nombre || "Agenda sin nombre";
                displayCode.innerHTML = `Código de acceso: <span style="color:#1a73e8; font-weight:bold;">${code.toUpperCase()}</span>`;

                const esDuenio = data.owner === currentUserUid;

                if (esDuenio) {
                    const adminBtn = document.createElement('button');
                    adminBtn.id = 'admin-publish-btn';
                    adminBtn.innerHTML = "<img src='anadir.png' width='20px' height='20px'> Publicar Nueva Tarea";
                    adminBtn.className = "btn-confirm"; 
                    adminBtn.style.marginTop = "15px";
                    adminBtn.onclick = () => abrirModalTarea(code); 
                    banner.appendChild(adminBtn); // Insertar en el banner limpio
                }

                if (data.tareas) {
                    // Convertimos a array y revertimos para ver las más recientes arriba
                    Object.keys(data.tareas).reverse().forEach(id => {
                        const t = data.tareas[id];
                        if (id === 'inicio') return; // Omitir el marcador de inicio si existe

                        const btnEliminar = esDuenio 
                            ? `<button class="btn-delete" onclick="eliminarTarea('${code}', '${id}')" title="Eliminar tarea">🗑️</button>` 
                            : "";

                        container.innerHTML += `
                            <div class="card">
                                <div class="card-header" style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <div>
                                        <h3>${t.titulo}</h3>
                                        <span>${t.materia}</span>
                                    </div>
                                    ${btnEliminar}
                                </div>
                                <div class="card-body"><p>${t.descripcion}</p></div>
                                <div class="card-footer"><span>Entrega: ${t.fecha}</span></div>
                            </div>`;
                    });
                }
            } else {
                mostrarEstadoVacio("La agenda " + code + " no existe.");
            }
        });
    } else {
        mostrarEstadoVacio("Ingresa un código para ver tu agenda.");
    }
}

// FUNCIÓN PARA ELIMINAR (Agrégala al final de tu script)
window.eliminarTarea = async (agendaCode, tareaId) => {
    if (confirm("¿Seguro que quieres borrar esta tarea?")) {
        try {
            const tareaRef = ref(db, `agendas/${agendaCode}/tareas/${tareaId}`);
            await set(tareaRef, null); // En Firebase, null elimina el dato
        } catch (error) {
            console.error("Error al eliminar:", error);
        }
    }
};

 document.getElementById('btn-action-confirm').onclick = async () => {
    const val = modalInput.value.trim();
    if (!val) return;

    const user = auth.currentUser;
    if (!user) return;

    if (currentMode === "create") {
        const codigoSecreto = generarCodigoAleatorio();
        
        // Referencia 1: La agenda global (donde están las tareas)
        const agendaRef = ref(db, 'agendas/' + codigoSecreto);
        // Referencia 2: El "llavero" del usuario (para que la vea en su menú)
        const userAgendaRef = ref(db, `usuarios/${user.uid}/mis_agendas/${codigoSecreto}`);

        try {
            // Guardamos la agenda completa
            await set(agendaRef, {
                nombre: val,
                owner: user.uid,
                tareas: {
                    inicio: { titulo: "Bienvenido", materia: "Sistema", descripcion: "Muro creado", fecha: "Hoy" }
                }
            });

            // Guardamos el acceso directo en el perfil del usuario
            await set(userAgendaRef, {
                nombre: val,
                rol: "creador"
            });

            window.location.href = `menu.html?code=${codigoSecreto}`;
        } catch (error) { console.error(error); }

    } else {
        // MODO UNIRSE: Buscamos si existe y la añadimos al perfil
        const codigo = val.toUpperCase();
        const agendaRef = ref(db, 'agendas/' + codigo);

        // Usamos "get" para revisar una sola vez
      
        
        const snapshot = await get(agendaRef);
        if (snapshot.exists()) {
            const data = snapshot.val();
            await set(ref(db, `usuarios/${user.uid}/mis_agendas/${codigo}`), {
                nombre: data.nombre,
                rol: "estudiante"
            });
            window.location.href = `menu.html?code=${codigo}`;
        } else {
            alert("Código no encontrado.");
        }
    }
};

    `;

    document.getElementById('btn-save-task').onclick = async () => {

        const materia = document.getElementById('t-materia').value.trim();
        const descripcion = document.getElementById('t-desc').value.trim();
        const fecha = document.getElementById('t-fecha').value.trim();

        if (titulo && materia) {
            // Referencia a la lista de tareas de esa agenda
            const tareasRef = ref(db, 'agendas/' + code + '/tareas');
            
            // Creamos una nueva posición con ID único usando push()
            const nuevaTareaRef = push(tareasRef);

            await set(nuevaTareaRef, {
                titulo: titulo,
                materia: materia,
                descripcion: descripcion,
                fecha: fecha
            });

            modal.style.display = "none";
            // No hace falta recargar, onValue actualizará la lista automáticamente

});function generarCodigoAleatorio(longitud = 6) {
    const caracteres = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Eliminamos 'I', 'O', '0', '1' para evitar confusiones
    let resultado = '';
    for (let i = 0; i < longitud; i++) {
        resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
    }
    return `PX-${resultado}`; // Prefijo para que sepa que es de Praxis
}
// Función global para eliminar una tarea específica
window.eliminarTarea = async (agendaCode, tareaId) => {
    if (confirm("¿Estás seguro de que quieres eliminar esta tarea?")) {
        try {
            // Referencia exacta a la tarea dentro de la agenda
            const tareaRef = ref(db, `agendas/${agendaCode}/tareas/${tareaId}`);
            
            // En Firebase, poner el valor en null elimina el nodo
            await set(tareaRef, null);
            
            // No hace falta recargar, onValue actualizará la vista automáticamente
        } catch (error) {
            console.error("Error al eliminar:", error);
            alert("No se pudo eliminar la tarea.");
        }
    }

async function obtenerTodasLasTareas(callback) {
    const user = auth.currentUser;
    const misAgendasRef = ref(db, `usuarios/${user.uid}/mis_agendas`);
    const snapshot = await get(misAgendasRef);
    const misAgendas = snapshot.val();
    
    if (!misAgendas) {
        renderizarVacio();
        return;
    }

    let tareasAcumuladas = [];
    const promesas = Object.keys(misAgendas).map(async (code) => {
        const agendaSnap = await get(ref(db, `agendas/${code}`));
        const agendaData = agendaSnap.val();
        if (agendaData && agendaData.tareas) {
            Object.keys(agendaData.tareas).forEach(id => {
                if(id !== 'inicio') { // Ignorar la tarea de bienvenida
                    tareasAcumuladas.push({
                        ...agendaData.tareas[id],
                        agendaNombre: agendaData.nombre,
                        agendaId: code
                    });
                }
            });
        }
    });

    await Promise.all(promesas);
    callback(tareasAcumuladas);
}

function renderizarVistaLista(lista, tipo) {

    lista.forEach(t => {
        container.innerHTML += `
            <div class="card" onclick="window.location.href='menu.html?code=${t.agendaId}'" style="cursor:pointer;">

(function() {
    // Solo activable si el usuario presiona "F" + "T" al mismo tiempo
    let keys = {};
    window.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        if (keys['f'] && keys['t']) {
            toggleFocusMode();
        }
    });
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    function toggleFocusMode() {
        let timerDiv = document.getElementById('praxis-focus-timer');
        if (timerDiv) {
            timerDiv.remove();
            return;
        }

        timerDiv = document.createElement('div');
        timerDiv.id = 'praxis-focus-timer';
        timerDiv.innerHTML = `
            <div style="font-size: 10px; margin-bottom: 5px; opacity: 0.8;">FOCUS MODE (BETA)</div>
            <div id="timer-display" style="font-size: 24px; font-weight: bold; font-family: monospace;">25:00</div>
            <button id="btn-start-timer" style="margin-top: 10px; border: none; background: white; color: #1a73e8; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-weight: bold;">Iniciar</button>
        `;
        
        // Estilo del widget flotante
        Object.assign(timerDiv.style, {
            position: 'fixed', bottom: '20px', right: '20px',
            background: '#1a73e8', color: 'white', padding: '15px',
            borderRadius: '16px', zIndex: '9999', textAlign: 'center',
            boxShadow: '0 4px 15px rgba(0,0,0,0.3)', width: '120px'
        });

        document.body.appendChild(timerDiv);

        let timeLeft = 25 * 60;
        let isRunning = false;
        let interval;

        document.getElementById('btn-start-timer').onclick = function() {
            if (isRunning) return;
            isRunning = true;
            this.innerText = "Estudiando...";
            interval = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('timer-display').innerText = 
                    `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    alert("¡Tiempo cumplido! Tómate un descanso.");
                    timerDiv.remove();
                }
            }, 1000);
        };
    }
})();
