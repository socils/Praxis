<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRAXIS v1.0.0 | ESTADO DEL SISTEMA</title>
    <style>
        :root {
            --logo-grad-start: #00d2ff;
            --logo-grad-end: #3a7bd5;
            --text-dark: #000;
            --bg-body: #ffffff;
            --text-wall: #e0e0e0;
            --brutal-shadow: 12px 12px 0px #000;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: var(--text-dark);
            overflow: hidden; 
            position: relative;
            padding: 20px;
        }

        /* Fondo plomo sutil */
        .background-wall {
            position: fixed; 
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            display: flex; flex-wrap: wrap;
            gap: 20px; z-index: 1;
            transform: rotate(-15deg);
            pointer-events: none;
            animation: scrollWall 50s linear infinite;
        }

        .background-wall span { 
            font-size: 22px; 
            font-weight: 900; 
            text-transform: uppercase; 
            color: var(--text-wall);
        }

        @keyframes scrollWall {
            from { transform: translate(0, 0) rotate(-15deg); }
            to { transform: translate(-400px, -400px) rotate(-15deg); }
        }

        .container {
            background: #fff;
            border: 6px solid #000;
            padding: 45px 25px;
            box-shadow: var(--brutal-shadow);
            text-align: center;
            max-width: 480px;
            width: 100%;
            z-index: 10;
            position: relative;
            animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .floating-badge {
            position: absolute;
            top: -15px; left: 20px;
            background: #000;
            color: #fff;
            padding: 5px 15px;
            font-size: 11px;
            font-weight: 900;
            border: 3px solid #000;
        }

        /* Logo degradado celeste */
        h1 {
            font-size: clamp(55px, 18vw, 90px);
            text-transform: uppercase;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -4px;
            background: linear-gradient(135deg, var(--logo-grad-start), var(--logo-grad-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
            margin-bottom: 20px;
        }

        /* DISEÑO DE MENSAJE "CHIDO" SIN GLITCH */
        .status-container {
            margin: 25px 0;
            padding: 15px;
            border: 3px double #000;
            position: relative;
            overflow: hidden;
            background: #fdfdfd;
        }

        .status-msg {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000;
            display: inline-block;
            /* Animación de entrada de texto */
            animation: slideReveal 0.8s ease-out forwards;
        }

        @keyframes slideReveal {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-container::before {
            content: "✓";
            position: absolute;
            left: 5px; top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--logo-grad-start);
            opacity: 0.4;
        }

        #countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 30px 0;
        }

        .time-box {
            background: #fff;
            border: 4px solid #000;
            padding: 12px 5px;
            box-shadow: 6px 6px 0px #000;
            transition: 0.3s;
        }
        
        .time-box:hover {
            transform: translateY(-5px);
            background: #f9f9f9;
            border-color: var(--logo-grad-start);
        }

        .time-box span { display: block; font-size: 26px; font-weight: 950; }
        .time-box label { font-size: 9px; text-transform: uppercase; font-weight: 900; opacity: 0.6; }

        /* Botón principal */
        .btn-beta {
            background: var(--logo-grad-start);
            color: #fff;
            text-decoration: none;
            font-weight: 950;
            padding: 18px;
            border: 4px solid #000;
            display: block;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 8px 8px 0px #000;
            transition: 0.2s;
            margin-bottom: 15px;
        }

        /* Botón de ayuda con ICONO */
        .btn-help {
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            padding: 12px;
            border: 4px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 13px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-help img { width: 20px; height: 20px; }

        .btn-beta:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px #000; }
        .btn-help:hover { background: #f0f0f0; transform: scale(1.02); }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <div class="background-wall" id="wall"></div>

    <div class="container">
        <div class="floating-badge">ALONIXZ-GROUP</div>
        
        <h1>PRAXIS</h1>
        
        <div class="status-container">
            <div class="status-msg">
                ¡EXCELENTES NOTICIAS!<br>
                EL SISTEMA ESTÁ LISTO ANTES DE TIEMPO
            </div>
        </div>
        
        <div id="countdown">
            <div class="time-box"><span id="days">00</span><label>Días</label></div>
            <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
            <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
            <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
        </div>

        <a href="autorizacion.html" class="btn-beta">ACCESO ANTICIPADO</a>

        <a href="ayuda.html" class="btn-help">
            <img src="informacion.png" alt="Info">
            ¿Cuál es su manual?
        </a>
        
        <p style="font-size: 9px; margin-top: 30px; font-weight: 900; color: #bbb; text-transform: uppercase;">
            Release 1.0.0 Stable | 2026
        </p>
    </div>

    <script>
        const wall = document.getElementById('wall');
        const fragment = document.createDocumentFragment();
        for(let i=0; i<150; i++) {
            const span = document.createElement('span');
            span.innerText = "PRAXIS ";
            fragment.appendChild(span);
        }
        wall.appendChild(fragment);

        // Cuenta regresiva puesta a cero o a la fecha que prefieras
        const launchDate = new Date("May 07, 2026 18:00:00").getTime();
        const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = launchDate - now;
            if (diff < 0) {
                clearInterval(timer);
                return;
            }
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
