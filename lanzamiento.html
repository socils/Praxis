<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRAXIS v1.0.0 | LANZAMIENTO</title>
    <style>
        :root {
            --primary: #0071ff;
            --success: #00ff88;
            --text: #000;
            --accent: #ffeb3b;
            --brutal-shadow: 12px 12px 0px #000;
            --mobile-shadow: 8px 8px 0px #000;
        }

        body {
            background-color: var(--primary);
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* FONDO DINÁMICO OPTIMIZADO */
        .background-wall {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 10px;
            z-index: 1;
            transform: rotate(-15deg);
            opacity: 0.15;
            pointer-events: none;
            animation: scrollWall 30s linear infinite;
        }

        .background-wall span {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
        }

        @keyframes scrollWall {
            from { transform: translate(0, 0) rotate(-15deg); }
            to { transform: translate(-300px, -300px) rotate(-15deg); }
        }

        /* CONTENEDOR RESPONSIVE */
        .container {
            background: #fff;
            border: 6px solid #000;
            padding: 40px 20px;
            box-shadow: var(--brutal-shadow);
            text-align: center;
            max-width: 450px;
            width: 100%;
            z-index: 10;
            position: relative;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .floating-badge {
            position: absolute;
            top: -20px;
            right: -10px;
            background: var(--success);
            border: 4px solid #000;
            padding: 6px 12px;
            font-size: 11px;
            transform: rotate(10deg);
            box-shadow: 5px 5px 0px #000;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: clamp(50px, 15vw, 85px);
            text-transform: uppercase;
            margin: 0;
            line-height: 0.85;
            letter-spacing: -4px;
            filter: drop-shadow(4px 4px 0px var(--success));
        }

        .version-tag {
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 6px 18px;
            font-size: clamp(14px, 4vw, 18px);
            margin-top: 15px;
            border-radius: 4px;
            font-weight: 900;
        }

        .transition-msg {
            font-size: clamp(10px, 3vw, 12px);
            color: var(--primary);
            margin-top: 12px;
            font-weight: 950;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* CONTADOR ADAPTABLE */
        #countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 30px 0;
        }

        .time-box {
            background: #f0f0f0;
            border: 3px solid #000;
            padding: 12px 2px;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.2s;
        }

        .time-box span {
            display: block;
            font-size: clamp(20px, 6vw, 28px);
            font-weight: 950;
            line-height: 1;
        }

        .time-box label {
            font-size: 8px;
            text-transform: uppercase;
            font-weight: 900;
            margin-top: 4px;
            display: block;
        }

        /* BOTÓN MOBILE-FIRST */
        .btn-beta {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: 950;
            padding: clamp(15px, 5vw, 22px);
            border: 5px solid #000;
            display: block;
            font-size: clamp(16px, 4.5vw, 20px);
            text-transform: uppercase;
            box-shadow: 6px 6px 0px #000;
            transition: 0.2s;
            margin-top: 20px;
            position: relative;
        }

        .btn-beta:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        /* MEDIA QUERIES PARA CELULARES */
        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
                box-shadow: var(--mobile-shadow);
            }
            
            .background-wall span {
                font-size: 15px;
            }

            .floating-badge {
                right: 0;
                top: -15px;
            }
        }

        /* ANIMACIONES SIN MODIFICAR FUNCIONALIDAD */
        @keyframes popIn {
            from { transform: scale(0.8) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(10deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
    </style>
</head>
<body>

    <div class="background-wall" id="wall"></div>

    <div class="container">
        <div class="floating-badge">ALONIXZ-GROUP</div>
        <h1>PRAXIS</h1>
        
        <div class="version-tag">ESTADO: BETA</div>
        <div class="transition-msg">PRÓXIMA VERSIÓN: 1.0.0</div>
        
        <div id="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <label>Días</label>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <label>Horas</label>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <label>Min</label>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <label>Seg</label>
            </div>
        </div>

        <a href="login.html" class="btn-beta">🚀 ACCESO BETA</a>
        
        <p style="font-size: 9px; margin-top: 25px; font-weight: 900; text-transform: uppercase; opacity: 0.8;">
            LANZAMIENTO: 18 MAYO 2026 | 18:00
        </p>
    </div>

    <script>
        const wall = document.getElementById('wall');
        const text = "PRAXIS ";
        for(let i=0; i<300; i++) {
            const span = document.createElement('span');
            span.innerText = text;
            wall.appendChild(span);
        }

        const launchDate = new Date("May 18, 2026 18:00:00").getTime();

        const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = launchDate - now;

            if (diff < 0) {
                clearInterval(timer);
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
