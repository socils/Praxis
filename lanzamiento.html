<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRAXIS v1.0.0 | ESTADO DEL SISTEMA</title>
    <style>
        :root {
            --primary: #0071ff;
            --success: #00ff88;
            --text: #000;
            --accent: #ffeb3b;
            --danger: #ff3e3e;
            --brutal-shadow: 12px 12px 0px #000;
            --mobile-shadow: 8px 8px 0px #000;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--primary);
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: var(--text);
            overflow: hidden; 
            position: relative;
            padding: 20px;
        }

        .background-wall {
            position: fixed; 
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            display: flex; flex-wrap: wrap;
            gap: 20px; padding: 10px;
            z-index: 1;
            transform: rotate(-15deg);
            opacity: 0.15;
            pointer-events: none;
            animation: scrollWall 40s linear infinite;
        }

        .background-wall span { font-size: 22px; font-weight: 900; text-transform: uppercase; }

        @keyframes scrollWall {
            from { transform: translate(0, 0) rotate(-15deg); }
            to { transform: translate(-400px, -400px) rotate(-15deg); }
        }

        .container {
            background: #fff;
            border: 6px solid #000;
            padding: 40px 25px;
            box-shadow: var(--brutal-shadow);
            text-align: center;
            max-width: 480px;
            width: 100%;
            z-index: 10;
            position: relative;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .floating-badge {
            position: absolute;
            top: -25px; right: -10px;
            background: var(--danger);
            border: 4px solid #000;
            padding: 8px 15px;
            font-size: 12px;
            transform: rotate(10deg);
            box-shadow: 6px 6px 0px #000;
            animation: float 3s ease-in-out infinite;
            font-weight: 900;
            color: #fff;
        }

        h1 {
            font-size: clamp(55px, 18vw, 90px);
            text-transform: uppercase;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -4px;
            filter: drop-shadow(5px 5px 0px var(--danger));
        }

        .error-msg {
            background: #000;
            color: var(--danger);
            padding: 15px;
            font-size: 14px;
            margin-top: 20px;
            font-weight: 900;
            text-transform: uppercase;
            border: 3px solid var(--danger);
        }

        #countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 25px 0;
        }

        .time-box {
            background: #fff;
            border: 4px solid #000;
            padding: 15px 5px;
            box-shadow: 5px 5px 0px #000;
        }

        .time-box span { display: block; font-size: clamp(20px, 5vw, 28px); font-weight: 950; }
        .time-box label { font-size: 9px; text-transform: uppercase; font-weight: 900; }

        .btn-beta {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: 950;
            padding: 18px;
            border: 5px solid #000;
            display: block;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 8px 8px 0px #000;
            transition: 0.2s;
            margin-bottom: 15px;
        }

        .btn-help {
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            padding: 12px;
            border: 4px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 13px;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #000;
        }

        .btn-help img { width: 20px; height: 20px; }

        .btn-beta:hover, .btn-help:hover { transform: translate(-2px, -2px); box-shadow: 10px 10px 0px #000; }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(10deg); } 50% { transform: translateY(-12px) rotate(12deg); } }
    </style>
</head>
<body>

    <div class="background-wall" id="wall"></div>

    <div class="container">
        <div class="floating-badge">ALONIXZ-GROUP</div>
        <h1>PRAXIS</h1>
        
        <div class="error-msg">
            Se hizo de forma inesperada: los cálculos de tiempo fallaron. <br>
            Dentro de una semana podría estar listo.
        </div>
        
        <div id="countdown">
            <div class="time-box"><span id="days">07</span><label>Días</label></div>
            <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
            <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
            <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
        </div>

        <a href="autorizacion.html" class="btn-beta">🚀 PROBAR ACCESO</a>

        <a href="ayuda.html" class="btn-help">
            <img src="informacion.png" alt="Info">
            ¿Cuál es su manual?
        </a>
        
        <p style="font-size: 10px; margin-top: 25px; font-weight: 900; text-transform: uppercase; background: var(--danger); color: #fff; display: inline-block; padding: 5px 10px;">
            NUEVA ESTIMACIÓN: 07 MAYO 2026
        </p>
    </div>

    <script>
        const wall = document.getElementById('wall');
        const fragment = document.createDocumentFragment();
        for(let i=0; i<200; i++) {
            const span = document.createElement('span');
            span.innerText = "PRAXIS ";
            fragment.appendChild(span);
        }
        wall.appendChild(fragment);

        // Nueva fecha: 7 días desde hoy (30 de Abril 2026 -> 7 de Mayo 2026)
        const launchDate = new Date("May 07, 2026 18:00:00").getTime();
        const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = launchDate - now;
            if (diff < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "¡INICIANDO!";
                return;
            }
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
