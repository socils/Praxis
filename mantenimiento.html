<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento | Praxis</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1a73e8;
            --dark: #121212;
            --text-muted: #5f6368;
            --border: #f1f3f4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .maintenance-container {
            text-align: center;
            max-width: 450px;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .logo-box img { width: 50px; height: auto; }
        .logo-box span { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; }

        .loader {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 25px;
            animation: spin 1s linear infinite;
        }

        h1 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; margin-bottom: 15px; letter-spacing: -1px; }
        p { color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; font-size: 1.05rem; }

        .badge-status {
            display: inline-block;
            background: #f8f9fa;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .btn-retry {
            margin-top: 30px;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-retry:hover { opacity: 0.9; transform: scale(1.05); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="logo-box">
            <img src="praxis.png" alt="Logo">
            <span>Praxis</span>
        </div>

        <div class="loader"></div>

        <h1>Estamos mejorando</h1>
        <p>Alonixz-Group está realizando ajustes en la base de datos para asegurar que tus puntos y agendas estén a salvo.</p>

        <div class="badge-status" id="status-text">
            SINCRONIZANDO CON ALONIXZ-CLOUD...
        </div>

        <br>
        <button class="btn-retry" onclick="window.location.reload()">Verificar ahora</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAUopIjgNXXAzDNhnp_E9krHVwPiwD0WQ8",
            authDomain: "praxis-79b9a.firebaseapp.com",
            projectId: "praxis-79b9a",
            databaseURL: "https://praxis-79b9a-default-rtdb.firebaseio.com",
            storageBucket: "praxis-79b9a.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Escuchar cambios en el modo mantenimiento
        const maintenanceRef = ref(db, 'config/mantenimiento_activo');

        onValue(maintenanceRef, (snapshot) => {
            const isMaintenance = snapshot.val();

            // Si detecta que ya NO está el comando (es false o no existe)
            if (isMaintenance === false || isMaintenance === null) {
                document.getElementById('status-text').innerText = "¡SISTEMA RESTABLECIDO!";
                document.getElementById('status-text').style.color = "#34a853";
                
                // Redirigir automáticamente después de 1.5 segundos
                setTimeout(() => {
                    window.location.href = "menu.html";
                }, 1500);
            } else {
                document.getElementById('status-text').innerText = "MODO MANTENIMIENTO ACTIVO";
                document.getElementById('status-text').style.color = "#d93025";
            }
        });
    </script>
</body>
</html>
